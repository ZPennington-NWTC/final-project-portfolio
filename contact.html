<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZacharyAtom | Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="nav-wrapper">
            <a href="index.html" class="logo">ZacharyAtom</a>

            <button class="menu-toggle" aria-label="Open Navigation">☰</button>

            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="videos.html">Videos</a></li>
                    <li><a href="games.html">Games</a></li>
                    <li><a href="gear.html">Gear</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-banner">
            <p class="eyebrow">Contact</p>
            <h1>Reach out for collaborations, feedback, or creator opportunities.</h1>
        </section>

        <section class="form-section">
            <form id="contact-form" action="" method="get">
                <fieldset>
                    <legend>Contact ZacharyAtom</legend>

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name">

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">

                    <label for="message">Message</label>
                    <textarea id="message" name="message"></textarea>

                    <input type="submit" value="Send Message" class="btn primary-btn">
                </fieldset>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 ZacharyAtom</p>
    </footer>

    <script src="lib/jquery.min.js"></script>
    <script src="lib/jquery.validate.min.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
